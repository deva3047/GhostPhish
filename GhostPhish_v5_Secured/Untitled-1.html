<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostPhish Pro — System Flowchart</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030a0f;
    --grid: #0a1a24;
    --neon-red: #ff2244;
    --neon-orange: #ff6600;
    --neon-yellow: #ffcc00;
    --neon-green: #00ff88;
    --neon-cyan: #00ccff;
    --neon-purple: #aa44ff;
    --dim: #1a2a38;
    --text: #c8dde8;
    --ghost: #ffffff08;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,204,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,204,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridDrift 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridDrift {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  /* Scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  header {
    text-align: center;
    padding: 48px 20px 32px;
    position: relative;
  }

  .ghost-icon {
    font-size: 64px;
    display: block;
    animation: ghostFloat 3s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255,34,68,0.8));
  }

  @keyframes ghostFloat {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-12px) rotate(2deg); }
  }

  header h1 {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(22px, 5vw, 42px);
    letter-spacing: 6px;
    background: linear-gradient(135deg, #ff2244, #ff6600, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    margin: 12px 0 6px;
  }

  header p {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    color: #446688;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* ─────── FLOWCHART CONTAINER ─────── */
  .flow-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 24px 80px;
    position: relative;
  }

  /* 3D perspective container */
  .section-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: #2a4a5a;
    text-align: center;
    margin: 32px 0 16px;
    text-transform: uppercase;
    border-top: 1px solid #0d2030;
    padding-top: 16px;
  }

  /* ─────── NODE STYLES ─────── */
  .node {
    position: relative;
    border-radius: 4px;
    padding: 14px 20px;
    text-align: center;
    margin: 0 auto;
    cursor: default;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    transform-style: preserve-3d;
  }

  .node:hover {
    transform: translateY(-3px) scale(1.02);
  }

  .node-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    opacity: 0.6;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .node-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 1px;
  }

  .node-sub {
    font-size: 11px;
    opacity: 0.6;
    margin-top: 4px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* 3D depth illusion — bottom face */
  .node::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 4px;
    right: -4px;
    height: 100%;
    border-radius: 4px;
    z-index: -1;
    filter: brightness(0.4);
  }

  /* ── Node types ── */
  .node-start {
    background: linear-gradient(135deg, #001a2e, #002a44);
    border: 2px solid var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0,204,255,0.3), inset 0 1px 0 rgba(0,204,255,0.2);
    color: var(--neon-cyan);
    width: 280px;
  }
  .node-start::after { background: var(--neon-cyan); }

  .node-trigger {
    background: linear-gradient(135deg, #0a1422, #101c2e);
    border: 1px solid #1a3a5a;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 8px rgba(0,204,255,0.1);
    color: #88bbcc;
    width: 240px;
  }
  .node-trigger::after { background: #1a3a5a; }

  .node-process {
    background: linear-gradient(135deg, #101830, #181e38);
    border: 1px solid #3344aa;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 12px rgba(80,100,255,0.15);
    color: #8899ff;
    width: 260px;
  }
  .node-process::after { background: #3344aa; }

  .node-decision {
    background: linear-gradient(135deg, #1a1400, #241c00);
    border: 2px solid var(--neon-yellow);
    box-shadow: 0 0 20px rgba(255,204,0,0.25), inset 0 1px 0 rgba(255,204,0,0.1);
    color: var(--neon-yellow);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    width: 200px;
    height: 100px;
    padding: 30px 30px;
  }

  .node-danger {
    background: linear-gradient(135deg, #1a0008, #240010);
    border: 2px solid var(--neon-red);
    box-shadow: 0 0 24px rgba(255,34,68,0.4), inset 0 1px 0 rgba(255,34,68,0.2);
    color: var(--neon-red);
    width: 240px;
  }
  .node-danger::after { background: var(--neon-red); }

  .node-warn {
    background: linear-gradient(135deg, #1a0d00, #241300);
    border: 2px solid var(--neon-orange);
    box-shadow: 0 0 20px rgba(255,102,0,0.3), inset 0 1px 0 rgba(255,102,0,0.15);
    color: var(--neon-orange);
    width: 240px;
  }
  .node-warn::after { background: var(--neon-orange); }

  .node-safe {
    background: linear-gradient(135deg, #001a10, #002418);
    border: 2px solid var(--neon-green);
    box-shadow: 0 0 20px rgba(0,255,136,0.25), inset 0 1px 0 rgba(0,255,136,0.1);
    color: var(--neon-green);
    width: 240px;
  }
  .node-safe::after { background: var(--neon-green); }

  .node-action {
    background: linear-gradient(135deg, #0a0f1a, #0e1422);
    border: 1px solid #223355;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    color: #6688aa;
    width: 220px;
  }
  .node-action::after { background: #223355; }

  .node-end {
    background: linear-gradient(135deg, #140022, #1e0033);
    border: 2px solid var(--neon-purple);
    box-shadow: 0 0 20px rgba(170,68,255,0.3), inset 0 1px 0 rgba(170,68,255,0.15);
    color: var(--neon-purple);
    width: 240px;
  }
  .node-end::after { background: var(--neon-purple); }

  /* ─────── ARROW SYSTEM ─────── */
  .arrow-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    height: 44px;
  }

  .arrow-line {
    width: 2px;
    height: 32px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
    position: relative;
  }

  .arrow-line::after {
    content: '▼';
    position: absolute;
    bottom: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255,255,255,0.25);
  }

  /* Colored arrows */
  .arrow-cyan .arrow-line { background: linear-gradient(to bottom, var(--neon-cyan), transparent); }
  .arrow-cyan .arrow-line::after { color: var(--neon-cyan); }

  .arrow-red .arrow-line { background: linear-gradient(to bottom, var(--neon-red), transparent); }
  .arrow-red .arrow-line::after { color: var(--neon-red); }

  .arrow-orange .arrow-line { background: linear-gradient(to bottom, var(--neon-orange), transparent); }
  .arrow-orange .arrow-line::after { color: var(--neon-orange); }

  .arrow-green .arrow-line { background: linear-gradient(to bottom, var(--neon-green), transparent); }
  .arrow-green .arrow-line::after { color: var(--neon-green); }

  .arrow-yellow .arrow-line { background: linear-gradient(to bottom, var(--neon-yellow), transparent); }
  .arrow-yellow .arrow-line::after { color: var(--neon-yellow); }

  .arrow-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0 8px;
    opacity: 0.8;
    font-family: 'Orbitron', monospace;
  }

  /* ─────── HORIZONTAL BRANCH LAYOUT ─────── */
  .branch-row {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 0;
    position: relative;
    margin: 0 auto;
  }

  .branch-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  /* Horizontal connector line */
  .h-connector {
    position: absolute;
    top: 0;
    height: 2px;
    background: rgba(255,255,255,0.08);
  }

  /* ─────── SVG ARROWS ─────── */
  svg.arrows {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  /* ─────── FULL FLOW CONTAINER ─────── */
  .flow-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin: 48px auto 0;
    max-width: 800px;
    padding: 20px;
    border: 1px solid #0d2030;
    background: rgba(0,0,0,0.3);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 1px;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    border: 1px solid;
  }

  /* ─────── FULL SVG FLOWCHART ─────── */
  .chart-container {
    position: relative;
    width: 100%;
    overflow-x: auto;
  }

  .main-svg {
    display: block;
    margin: 0 auto;
    font-family: 'Share Tech Mono', monospace;
  }

  /* Glow animations */
  @keyframes pulseRed { 0%,100%{filter:drop-shadow(0 0 6px #ff2244)} 50%{filter:drop-shadow(0 0 16px #ff2244)} }
  @keyframes pulseGreen { 0%,100%{filter:drop-shadow(0 0 6px #00ff88)} 50%{filter:drop-shadow(0 0 16px #00ff88)} }
  @keyframes pulseCyan { 0%,100%{filter:drop-shadow(0 0 6px #00ccff)} 50%{filter:drop-shadow(0 0 16px #00ccff)} }
  @keyframes pulseYellow { 0%,100%{filter:drop-shadow(0 0 6px #ffcc00)} 50%{filter:drop-shadow(0 0 16px #ffcc00)} }

  .pulse-red { animation: pulseRed 2s ease-in-out infinite; }
  .pulse-green { animation: pulseGreen 2.5s ease-in-out infinite; }
  .pulse-cyan { animation: pulseCyan 3s ease-in-out infinite; }
  .pulse-yellow { animation: pulseYellow 2s ease-in-out infinite; }

  /* Flowing arrow animation */
  @keyframes flowDash {
    to { stroke-dashoffset: -20; }
  }

  .flow-arrow {
    stroke-dasharray: 6 4;
    animation: flowDash 1s linear infinite;
  }

  .flow-arrow-slow {
    stroke-dasharray: 8 6;
    animation: flowDash 1.5s linear infinite;
  }
</style>
</head>
<body>

<header>
  <span class="ghost-icon">👻</span>
  <h1>GHOSTPHISH PRO</h1>
  <p>Complete System Flowchart &nbsp;·&nbsp; v3.0 Architecture</p>
</header>

<div class="flow-wrap">

  <div class="chart-container">
    <!-- MAIN SVG FLOWCHART -->
    <svg class="main-svg" viewBox="0 0 1060 3200" width="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Arrow markers -->
        <marker id="arr-cyan" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 L2,4 Z" fill="#00ccff"/>
        </marker>
        <marker id="arr-red" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 L2,4 Z" fill="#ff2244"/>
        </marker>
        <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 L2,4 Z" fill="#ff6600"/>
        </marker>
        <marker id="arr-green" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 L2,4 Z" fill="#00ff88"/>
        </marker>
        <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 L2,4 Z" fill="#ffcc00"/>
        </marker>
        <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 L2,4 Z" fill="#aa44ff"/>
        </marker>
        <marker id="arr-dim" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 L2,4 Z" fill="#446688"/>
        </marker>
        <!-- Glow filters -->
        <filter id="glow-cyan" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-red" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-green" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-yellow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Gradient backgrounds -->
        <linearGradient id="grad-start" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#001a2e"/>
          <stop offset="100%" style="stop-color:#002a44"/>
        </linearGradient>
        <linearGradient id="grad-process" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#101830"/>
          <stop offset="100%" style="stop-color:#181e38"/>
        </linearGradient>
        <linearGradient id="grad-danger" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#1a0008"/>
          <stop offset="100%" style="stop-color:#240010"/>
        </linearGradient>
        <linearGradient id="grad-warn" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#1a0d00"/>
          <stop offset="100%" style="stop-color:#241300"/>
        </linearGradient>
        <linearGradient id="grad-safe" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#001a10"/>
          <stop offset="100%" style="stop-color:#002418"/>
        </linearGradient>
        <linearGradient id="grad-decision" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#1a1400"/>
          <stop offset="100%" style="stop-color:#241c00"/>
        </linearGradient>
        <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#140022"/>
          <stop offset="100%" style="stop-color:#1e0033"/>
        </linearGradient>
        <linearGradient id="grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#0a0f1a"/>
          <stop offset="100%" style="stop-color:#0e1422"/>
        </linearGradient>
        <!-- 3D shadow gradients -->
        <linearGradient id="shadow-v" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:rgba(0,0,0,0.6)"/>
          <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
        </linearGradient>
      </defs>

      <!-- ══════════════════════════════════════════ -->
      <!-- SECTION 1: ENTRY POINTS                   -->
      <!-- ══════════════════════════════════════════ -->
      <text x="530" y="28" text-anchor="middle" fill="#1a3a4a" font-family="Orbitron" font-size="9" letter-spacing="4">SECTION 1 — ENTRY POINTS &amp; INITIALIZATION</text>
      <line x1="100" y1="32" x2="430" y2="32" stroke="#0d2030" stroke-width="1"/>
      <line x1="630" y1="32" x2="960" y2="32" stroke="#0d2030" stroke-width="1"/>

      <!-- NODE: Extension Installed -->
      <g class="pulse-cyan" transform="translate(530,60)">
        <!-- 3D depth -->
        <rect x="-148" y="7" width="296" height="50" rx="3" fill="#001628" opacity="0.7"/>
        <!-- Main box -->
        <rect x="-150" y="0" width="296" height="50" rx="3" fill="url(#grad-start)" stroke="#00ccff" stroke-width="2"/>
        <rect x="-150" y="0" width="296" height="1" fill="rgba(0,204,255,0.4)"/>
        <text y="18" text-anchor="middle" fill="#00ccff88" font-family="Orbitron" font-size="8" letter-spacing="3">ENTRY POINT</text>
        <text y="34" text-anchor="middle" fill="#00ccff" font-family="Orbitron" font-size="13" font-weight="700" letter-spacing="1">EXTENSION LOADED</text>
        <text y="46" text-anchor="middle" fill="#00ccff66" font-family="Share Tech Mono" font-size="9">Chrome Extension Installed &amp; Enabled</text>
      </g>

      <!-- Arrow down -->
      <line x1="530" y1="117" x2="530" y2="152" stroke="#00ccff" stroke-width="1.5" marker-end="url(#arr-cyan)" class="flow-arrow"/>

      <!-- NODE: Three triggers row -->
      <!-- Trigger 1: Tab Updated -->
      <g transform="translate(210,160)">
        <rect x="-108" y="5" width="216" height="46" rx="2" fill="#080f18" opacity="0.8"/>
        <rect x="-110" y="0" width="216" height="46" rx="2" fill="url(#grad-dark)" stroke="#1a3a5a" stroke-width="1"/>
        <text y="14" text-anchor="middle" fill="#446688" font-family="Orbitron" font-size="7" letter-spacing="2">TRIGGER A</text>
        <text y="27" text-anchor="middle" fill="#88bbcc" font-family="Rajdhani" font-size="14" font-weight="700">TAB NAVIGATION</text>
        <text y="40" text-anchor="middle" fill="#446688" font-family="Share Tech Mono" font-size="9">tabs.onUpdated (status=complete)</text>
      </g>

      <!-- Trigger 2: Download -->
      <g transform="translate(530,160)">
        <rect x="-108" y="5" width="216" height="46" rx="2" fill="#080f18" opacity="0.8"/>
        <rect x="-110" y="0" width="216" height="46" rx="2" fill="url(#grad-dark)" stroke="#1a3a5a" stroke-width="1"/>
        <text y="14" text-anchor="middle" fill="#446688" font-family="Orbitron" font-size="7" letter-spacing="2">TRIGGER B</text>
        <text y="27" text-anchor="middle" fill="#88bbcc" font-family="Rajdhani" font-size="14" font-weight="700">FILE DOWNLOAD</text>
        <text y="40" text-anchor="middle" fill="#446688" font-family="Share Tech Mono" font-size="9">downloads.onCreated event</text>
      </g>

      <!-- Trigger 3: Content Script -->
      <g transform="translate(850,160)">
        <rect x="-108" y="5" width="216" height="46" rx="2" fill="#080f18" opacity="0.8"/>
        <rect x="-110" y="0" width="216" height="46" rx="2" fill="url(#grad-dark)" stroke="#1a3a5a" stroke-width="1"/>
        <text y="14" text-anchor="middle" fill="#446688" font-family="Orbitron" font-size="7" letter-spacing="2">TRIGGER C</text>
        <text y="27" text-anchor="middle" fill="#88bbcc" font-family="Rajdhani" font-size="14" font-weight="700">PAGE LOAD DOM</text>
        <text y="40" text-anchor="middle" fill="#446688" font-family="Share Tech Mono" font-size="9">content.js injected on page</text>
      </g>

      <!-- Horizontal line from main arrow to triggers -->
      <line x1="210" y1="153" x2="850" y2="153" stroke="#1a3a5a" stroke-width="1.5"/>
      <line x1="210" y1="153" x2="210" y2="160" stroke="#1a3a5a" stroke-width="1.5" marker-end="url(#arr-dim)"/>
      <line x1="530" y1="153" x2="530" y2="160" stroke="#1a3a5a" stroke-width="1.5" marker-end="url(#arr-dim)"/>
      <line x1="850" y1="153" x2="850" y2="160" stroke="#1a3a5a" stroke-width="1.5" marker-end="url(#arr-dim)"/>

      <!-- ══════════════════════════════════════════ -->
      <!-- SECTION 2: ON/OFF CHECK                   -->
      <!-- ══════════════════════════════════════════ -->
      <text x="530" y="235" text-anchor="middle" fill="#1a3a4a" font-family="Orbitron" font-size="9" letter-spacing="4">SECTION 2 — ENABLED CHECK</text>
      <line x1="100" y1="238" x2="430" y2="238" stroke="#0d2030" stroke-width="1"/>
      <line x1="630" y1="238" x2="960" y2="238" stroke="#0d2030" stroke-width="1"/>

      <!-- Arrows to enabled check -->
      <line x1="210" y1="206" x2="210" y2="248" stroke="#1a3a5a" stroke-width="1.2"/>
